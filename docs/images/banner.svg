<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="50%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <!-- Light background -->
  <rect width="1200" height="320" fill="url(#bg)" rx="16"/>

  <!-- Subtle accent orbs -->
  <circle cx="100" cy="160" r="200" fill="#6366f1" opacity="0.035" filter="url(#soft-blur)"/>
  <circle cx="1050" cy="80" r="180" fill="#8b5cf6" opacity="0.03" filter="url(#soft-blur)"/>
  <circle cx="800" cy="300" r="150" fill="#6366f1" opacity="0.02" filter="url(#soft-blur)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.05" fill="#6366f1">
    <circle cx="50" cy="40" r="1.5"/><circle cx="90" cy="40" r="1.5"/><circle cx="130" cy="40" r="1.5"/>
    <circle cx="50" cy="80" r="1.5"/><circle cx="90" cy="80" r="1.5"/><circle cx="130" cy="80" r="1.5"/>
    <circle cx="1050" cy="240" r="1.5"/><circle cx="1090" cy="240" r="1.5"/><circle cx="1130" cy="240" r="1.5"/>
    <circle cx="1050" cy="280" r="1.5"/><circle cx="1090" cy="280" r="1.5"/><circle cx="1130" cy="280" r="1.5"/>
  </g>

  <!-- Main title -->
  <text x="600" y="100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#1e1b4b" letter-spacing="-3" text-anchor="middle">
    Open Intern
  </text>

  <!-- Tagline -->
  <text x="600" y="148" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#6366f1" font-weight="600" letter-spacing="0.5" text-anchor="middle">
    Enterprise AI Employee Platform
  </text>

  <!-- Description -->
  <text x="600" y="190" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#64748b" letter-spacing="0.3" text-anchor="middle">
    Secure, self-hosted AI teammate with organizational memory,
  </text>
  <text x="600" y="212" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#64748b" letter-spacing="0.3" text-anchor="middle">
    proactive initiative, and enterprise-grade safety controls.
  </text>

  <!-- Badges row -->
  <g transform="translate(292, 240)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="55" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#4f46e5" text-anchor="middle" font-weight="600">Self-Hosted</text>

    <rect x="122" y="0" width="110" height="30" rx="15" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="177" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#4f46e5" text-anchor="middle" font-weight="600">Audit Trail</text>

    <rect x="244" y="0" width="130" height="30" rx="15" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="309" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#4f46e5" text-anchor="middle" font-weight="600">Multi-Platform</text>

    <rect x="386" y="0" width="136" height="30" rx="15" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="454" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#4f46e5" text-anchor="middle" font-weight="600">Zero Telemetry</text>
  </g>

  <!-- MIT badge top right -->
  <rect x="1020" y="16" width="156" height="32" rx="16" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="1098" y="37" font-family="system-ui, sans-serif" font-size="13" fill="#4f46e5" text-anchor="middle" font-weight="600">MIT Licensed</text>

  <!-- Bottom accent line -->
  <rect x="0" y="312" width="1200" height="8" fill="url(#accent)" opacity="0.5"/>
</svg>
