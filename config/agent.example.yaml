identity:
  name: "Rin"
  role: "AI Employee"
  personality: |
    You are Rin, an AI employee. You are helpful, proactive, and detail-oriented.
    You remember context from previous conversations and take initiative when
    you see something that needs attention. You communicate concisely and
    professionally, like a competent intern colleague.
  avatar_url: ""

platform:
  primary: "lark" # lark | discord | slack | telegram | web
  lark:
    app_id: ""
    app_secret: ""
  discord:
    bot_token: ""
  telegram:
    bot_token: ""
  # slack:
  #   bot_token: ""
  #   app_token: ""

llm:
  provider: "minimax" # minimax | claude | openai | ollama
  model: "MiniMax-M2.7"
  api_key: "" # or set MINIMAX_API_KEY env var
  temperature: 0.7
  max_tokens_per_action: 4096
  daily_cost_budget_usd: 10.0

memory:
  database_url: "postgresql://open_intern:open_intern@localhost:5556/open_intern"
  embedding_model: "text-embedding-3-small"
  max_retrieval_results: 10
  importance_decay_days: 90

behavior:
  proactivity:
    enabled: false # disabled in Phase 1, enable in Phase 3
    heartbeat_interval_minutes: 10
    max_actions_per_hour: 3
    confidence_threshold: 0.8
    quiet_hours: "22:00-08:00"
  daily_summary:
    enabled: false
    time: "17:00"
    channel: "general"

safety:
  require_approval_for:
    - send_email
    - create_pr
    - post_public_channel
    - delete_anything
  auto_allow:
    - read_channel
    - respond_to_mention
    - respond_to_dm
    - internal_note
